<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gestor de Carreteras</title>
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <h1 class="logo">🛣️ Carreteras</h1>
      <button id="refresh" class="btn-refresh">↻ Actualizar</button>
    </div>
  </nav>

  <div class="container">
    <div class="grid-main">
      <!-- Búsqueda de rutas -->
      <section class="card card-search">
        <h2>Buscar Ruta</h2>
        <div class="search-form">
          <div class="form-group">
            <label>Desde:</label>
            <select id="start" class="select"></select>
          </div>
          <div class="form-group">
            <label>Hasta:</label>
            <select id="goal" class="select"></select>
          </div>
          <button id="routeBtn" class="btn btn-primary">Calcular Ruta</button>
        </div>
        <div id="result" class="result-box">Selecciona puntos de inicio y destino</div>
      </section>

      <!-- Agregar lugar -->
      <section class="card card-add">
        <h2>+ Nuevo Lugar</h2>
        <div class="form-group">
          <input id="name" type="text" placeholder="Nombre del lugar" class="input">
        </div>
        <div class="form-row">
          <div class="form-group">
            <input id="lat" type="number" placeholder="Latitud" step="any" class="input">
          </div>
          <div class="form-group">
            <input id="lon" type="number" placeholder="Longitud" step="any" class="input">
          </div>
        </div>
        <button id="addPlace" class="btn btn-secondary w-full">Agregar Lugar</button>
      </section>

      <!-- Agregar conexión -->
      <section class="card card-add">
        <h2>+ Nueva Conexión</h2>
        <div class="form-group">
          <label>Desde:</label>
          <select id="from" class="select"></select>
        </div>
        <div class="form-group">
          <label>Hasta:</label>
          <select id="to" class="select"></select>
        </div>
        <div class="form-group">
          <input id="cost" type="number" placeholder="Distancia (km)" step="any" class="input">
        </div>
        <button id="addEdge" class="btn btn-secondary w-full">Agregar Conexión</button>
      </section>
    </div>

    <!-- Tabla de datos -->
    <section class="card card-full">
      <h2>Lugares</h2>
      <div class="table-wrapper">
        <table class="table" id="placesTable">
          <thead>
            <tr>
              <th>Lugar</th>
              <th>Ubicación</th>
              <th>Conexiones</th>
            </tr>
          </thead>
          <tbody id="placesBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
